name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # PHP API endpointy (public/api/*.php) Astro prenesie do dist/ ako static;
      # PHPMailer/composer závislosti sa inštalujú na serveri — viď reporty.

      # SFTP-only účet (deploy.auresa.sk) NEPOVOĽUJE shell exec:
      #  - wlixcc sftp_only:true  → `sftp put -r` nevie vytvoriť priečinky
      #    ("Unable to canonicalize path")
      #  - wlixcc sftp_only:false → skúša `ssh mkdir` → "exec request failed"
      #  - SamKirkland FTP-Deploy-Action → nepodporuje protocol: sftp
      # Riešenie: lftp `mirror -R` vytvára priečinky cez SFTP protokol (MKDIR),
      # bez shellu. Credentials cez ~/.netrc (mimo command-line = bezpečné voči
      # špeciálnym znakom v hesle).
      - name: Deploy via SFTP (lftp)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$SFTP_USER" --env-password "sftp://$SFTP_HOST:$SFTP_PORT" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 20; mkdir -pf \"$SFTP_PATH\"; mirror -R --no-perms --verbose --parallel=4 ./dist/ \"$SFTP_PATH/\"; bye"
