name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # PHP API endpointy (public/api/*.php) Astro prenesie do dist/ ako static;
      # PHPMailer/composer závislosti sa inštalujú na serveri — viď reporty.

      # FTP-Deploy-Action cez SFTP: automaticky vytvára chýbajúce remote
      # priečinky (rieši chybu "Unable to canonicalize path" z wlixcc put -r).
      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local-dir: ./dist/
          server-dir: ${{ secrets.SFTP_PATH }}/
