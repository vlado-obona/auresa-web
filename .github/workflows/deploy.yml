name: Deploy to Websupport

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      # Deploy cieľ podľa vetvy:
      #   main    → PROD  (existujúci secret SFTP_PATH = /sub/test) — NEMENIŤ
      #   staging → STAGING (nový secret SFTP_PATH_STAGING = /sub/staging)
      # Rovnaký SFTP účet (HOST/PORT/USER/PASS), líši sa len cieľová cesta.
      # SFTP-only účet nepovoľuje shell exec → lftp `mirror -R` vytvára priečinky
      # cez SFTP MKDIR. Mirror je ADITÍVNY (bez --delete).

      - name: Deploy PROD (main → SFTP_PATH)
        if: github.ref == 'refs/heads/main'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          if [ -z "$SFTP_PATH" ]; then echo "::error::SFTP_PATH (prod) nie je nastavený"; exit 1; fi
          lftp -u "$SFTP_USER" --env-password "sftp://$SFTP_HOST:$SFTP_PORT" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 20; mkdir -pf \"$SFTP_PATH\"; mirror -R --no-perms --verbose --parallel=4 ./dist/ \"$SFTP_PATH/\"; bye"

      - name: Deploy STAGING (staging → SFTP_PATH_STAGING)
        if: github.ref == 'refs/heads/staging'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.SFTP_PASS }}
          SFTP_PATH: ${{ secrets.SFTP_PATH_STAGING }}
        run: |
          if [ -z "$SFTP_PATH" ]; then echo "::error::SFTP_PATH_STAGING nie je nastavený — pridaj secret v GitHub Settings (Settings → Secrets → Actions)"; exit 1; fi
          lftp -u "$SFTP_USER" --env-password "sftp://$SFTP_HOST:$SFTP_PORT" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 20; mkdir -pf \"$SFTP_PATH\"; mirror -R --no-perms --verbose --parallel=4 ./dist/ \"$SFTP_PATH/\"; bye"
