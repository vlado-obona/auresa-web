name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # PHP API endpointy (public/api/*.php) Astro prenesie do dist/ ako static;
      # PHPMailer/composer závislosti sa inštalujú na serveri — viď reporty.

      # SFTP upload. sftp_only:false → akcia použije lftp `mirror -R`, ktorý
      # automaticky vytvára chýbajúce remote podpriečinky (rieši chybu
      # "Unable to canonicalize path" z plain `sftp put -r`).
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local_path: './dist/*'
          remote_path: ${{ secrets.SFTP_PATH }}
          sftp_only: false
