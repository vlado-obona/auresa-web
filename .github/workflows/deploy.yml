name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # Skopíruj PHP API endpointy (Astro ich nekopíruje z public/ ak nie sú
      # routovateľné — sú v public/, takže ich Astro prenesie do dist/ ako static.)
      # PHPMailer závislosti sa inštalujú na serveri (composer) — viď reporty.

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local_path: './dist/*'
          remote_path: ${{ secrets.SFTP_PATH }}
          sftp_only: true
